<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - DuoChat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #ff6b9d 0%, #c2185b 100%);
            --secondary-gradient: linear-gradient(135deg, #ff8fab 0%, #e91e63 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --dark-bg: linear-gradient(135deg, #0f0c29 0%, #302b63 100%);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 107, 157, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(194, 24, 91, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: gradientShift 8s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% {
                background: radial-gradient(circle at 20% 50%, rgba(255, 107, 157, 0.1) 0%, transparent 50%),
                            radial-gradient(circle at 80% 80%, rgba(194, 24, 91, 0.1) 0%, transparent 50%);
            }
            50% {
                background: radial-gradient(circle at 80% 50%, rgba(255, 107, 157, 0.15) 0%, transparent 50%),
                            radial-gradient(circle at 20% 30%, rgba(194, 24, 91, 0.15) 0%, transparent 50%);
            }
        }

        /* Blur effect background */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(50px);
            pointer-events: none;
            z-index: 0;
        }

        /* Main Container */
        .contact-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Contact Wrapper */
        .contact-wrapper {
            width: 100%;
            max-width: 600px;
        }

        /* Contact Section */
        .contact-section {
            position: relative;
            width: 100%;
        }

        /* Glassmorphism Card */
        .contact-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        inset 0 1px 1px rgba(255, 255, 255, 0.2);
            animation: slideUp 0.8s cubic-bezier(0.4, 0.0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* Card Border Glow */
        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.1), rgba(194, 24, 91, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 30px;
            pointer-events: none;
        }

        .contact-card:hover::before {
            opacity: 1;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header Section */
        .contact-header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .logo-icon {
            font-size: 40px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .app-name {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .contact-header h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .contact-header p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0;
        }

        .header-divider {
            width: 60px;
            height: 3px;
            background: var(--primary-gradient);
            border-radius: 2px;
            margin: 15px auto;
            animation: expandWidth 0.8s cubic-bezier(0.4, 0.0, 0.2, 1) 0.2s backwards;
        }

        @keyframes expandWidth {
            from {
                width: 0;
            }
            to {
                width: 60px;
            }
        }

        /* Form Group */
        .form-group {
            margin-bottom: 25px;
            animation: fadeInUp 0.8s cubic-bezier(0.4, 0.0, 0.2, 1);
            animation-fill-mode: backwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.3s; }
        .form-group:nth-child(2) { animation-delay: 0.4s; }
        .form-group:nth-child(3) { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        /* Input Fields */
        .form-input,
        .form-textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 107, 157, 0.3);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            backdrop-filter: blur(10px);
            resize: vertical;
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            background: rgba(255, 107, 157, 0.15);
            border-color: rgba(255, 107, 157, 0.8);
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.1),
                        inset 0 0 10px rgba(255, 107, 157, 0.05);
            transform: translateY(-2px);
        }

        .form-input:hover,
        .form-textarea:hover {
            border-color: rgba(255, 107, 157, 0.5);
            background: rgba(255, 255, 255, 0.12);
        }

        /* Textarea Specific */
        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(255, 107, 157, 0.3),
                        0 0 0 0 rgba(255, 107, 157, 0.5);
            animation: slideInUp 0.8s cubic-bezier(0.4, 0.0, 0.2, 1) 0.6s backwards;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glowing Effect */
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        /* Cute Loop Animation */
        .submit-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 32px rgba(255, 107, 157, 0.5),
                        0 0 20px rgba(255, 107, 157, 0.6);
            animation: loopAnimation 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes loopAnimation {
            0%, 100% {
                transform: translateY(-2px) scale(1.02);
            }
            50% {
                transform: translateY(-6px) scale(1.04);
            }
        }

        .submit-btn:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 4px 16px rgba(255, 107, 157, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            animation: none;
        }

        /* Button Text */
        .submit-btn span {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn i {
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover i {
            transform: rotate(20deg) scale(1.2);
        }

        /* Success Message */
        .success-message {
            background: rgba(16, 185, 129, 0.2);
            border: 1.5px solid rgba(16, 185, 129, 0.5);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 25px;
            display: none;
            align-items: center;
            gap: 15px;
            animation: slideInDown 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .success-message.show {
            display: flex;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            font-size: 24px;
            color: var(--success-color);
            flex-shrink: 0;
            animation: checkmark 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes checkmark {
            0% {
                transform: scale(0) rotate(-45deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
            }
        }

        .success-text {
            color: var(--success-color);
            font-size: 14px;
            font-weight: 600;
        }

        /* Social Links */
        .social-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 107, 157, 0.2);
            animation: fadeIn 0.8s cubic-bezier(0.4, 0.0, 0.2, 1) 0.7s backwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .social-link {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 107, 157, 0.3);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            cursor: pointer;
        }

        .social-link:hover {
            background: var(--primary-gradient);
            border-color: var(--primary-gradient);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4);
        }

        .social-link.email {
            color: #ff4757;
        }

        .social-link.github {
            color: #6e5494;
        }

        .social-link.instagram {
            background: linear-gradient(135deg, #feda75, #fa7e1e, #d92e7f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Footer */
        .footer-text {
            text-align: center;
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 107, 157, 0.2);
            font-size: 13px;
            color: var(--text-secondary);
            animation: fadeIn 0.8s cubic-bezier(0.4, 0.0, 0.2, 1) 0.8s backwards;
        }

        .footer-text .heart {
            color: #ff6b9d;
            animation: heartbeat 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.3);
            }
            50% {
                transform: scale(1);
            }
        }

        .footer-text a {
            color: #ff6b9d;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        /* Loading State */
        .submit-btn.loading {
            animation: none;
        }

        .submit-btn.loading span {
            opacity: 0;
        }

        .submit-btn.loading::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .contact-card {
                padding: 35px 25px;
                border-radius: 20px;
            }

            .contact-header h2 {
                font-size: 24px;
            }

            .app-name {
                font-size: 28px;
            }

            .logo-icon {
                font-size: 32px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-input,
            .form-textarea {
                padding: 12px 16px;
                font-size: 16px;
            }

            .submit-btn {
                padding: 14px;
                font-size: 14px;
            }

            .social-links {
                gap: 12px;
            }

            .social-link {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .contact-container {
                padding: 15px;
            }

            .contact-card {
                padding: 25px 18px;
                border-radius: 16px;
            }

            .contact-header h2 {
                font-size: 20px;
            }

            .contact-header p {
                font-size: 13px;
            }

            .app-name {
                font-size: 24px;
            }

            .logo-icon {
                font-size: 28px;
            }

            .form-label {
                font-size: 12px;
            }

            .form-input,
            .form-textarea {
                padding: 11px 14px;
                font-size: 16px;
            }

            .form-textarea {
                min-height: 100px;
            }

            .submit-btn {
                padding: 12px;
                font-size: 13px;
                border-radius: 10px;
            }

            .submit-btn span {
                gap: 8px;
            }

            .submit-btn i {
                font-size: 14px;
            }

            .social-links {
                gap: 10px;
                margin-top: 25px;
            }

            .social-link {
                width: 38px;
                height: 38px;
                font-size: 14px;
                border-radius: 8px;
            }

            .footer-text {
                font-size: 12px;
                margin-top: 25px;
            }

            .header-divider {
                width: 50px;
            }
        }

        /* Accessibility */
        .submit-btn:focus-visible {
            outline: 2px solid var(--text-primary);
            outline-offset: 2px;
        }

        input:focus-visible,
        textarea:focus-visible {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <div class="contact-wrapper">
            <div class="contact-section">
                <div class="contact-card">
                    <!-- Success Message -->
                    <div class="success-message" id="successMessage">
                        <i class="fas fa-check-circle success-icon"></i>
                        <span class="success-text">Message sent successfully! 🎉</span>
                    </div>

                    <!-- Contact Header -->
                    <div class="contact-header">
                        <div class="logo-section">
                            <img src="https://i.ibb.co/Kcncy0xX/gemini-image-2-a-surreal-and-vibrant-cinematic-photo-of-a-premium-modern-logo-for-a-chatting-ap-1.jpg" 
                                 alt="ChatSphere Logo" 
                                 class="logo-img" 
                                 style="width: 60px; height: 60px; border-radius: 12px; object-fit: cover;">
                            <div class="app-name">DuoChat</div>
                        </div>
                        <h2>Get in Touch</h2>
                        <div class="header-divider"></div>
                        <p>We'd love to hear from you! Send us a message and we'll respond as soon as possible.</p>
                    </div>

                    <!-- Contact Form -->
                    <form id="contactForm" method="POST" action="https://formspree.io/f/mjgpdozq">
                        <!-- Name Field -->
                        <div class="form-group">
                            <label class="form-label">Full Name</label>
                            <input 
                                type="text" 
                                name="name" 
                                class="form-input" 
                                placeholder="Enter your name"
                                required
                                minlength="2"
                            >
                        </div>

                        <!-- Email Field -->
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input 
                                type="email" 
                                name="email" 
                                class="form-input" 
                                placeholder="your.email@example.com"
                                required
                            >
                        </div>

                        <!-- Message Field -->
                        <div class="form-group">
                            <label class="form-label">Message</label>
                            <textarea 
                                name="message" 
                                class="form-textarea" 
                                placeholder="Tell us what's on your mind... (minimum 10 characters)"
                                required
                                minlength="10"
                            ></textarea>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="submit-btn" id="submitBtn">
                            <span>
                                <i class="fas fa-paper-plane"></i>
                                Send Message
                            </span>
                        </button>
                    </form>

                    <!-- Social Links -->
                    <div class="social-links">
                        <a href="https://github.com/Hamiraniansh" target="_blank" rel="noopener noreferrer" class="social-link github" title="GitHub">
                            <i class="fab fa-github"></i>
                        </a>
                        <a href="mailto:usaearningbot@gmail.com" class="social-link email" title="Email">
                            <i class="fas fa-envelope"></i>
                        </a>
                        <a href="https://instagram.com/ansh_br4hz" target="_blank" rel="noopener noreferrer" class="social-link instagram" title="Instagram">
                            <i class="fab fa-instagram"></i>
                        </a>
                    </div>

                    <!-- Footer -->
                    <div class="footer-text">
                        Made with <span class="heart">❤️</span> by <a href="#">Professor Ansh</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Form Handling
        const contactForm = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');

        contactForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Add loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                // Get form data
                const formData = new FormData(contactForm);
                const response = await fetch(contactForm.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    // Show success message
                    successMessage.classList.add('show');
                    
                    // Reset form
                    contactForm.reset();

                    // Hide success message after 5 seconds
                    setTimeout(() => {
                        successMessage.classList.remove('show');
                    }, 5000);

                    // Reset button
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                } else {
                    throw new Error('Form submission failed');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again later.');
                
                // Reset button on error
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });

        // Input validation feedback
        const inputs = document.querySelectorAll('.form-input, .form-textarea');
        inputs.forEach(input => {
            input.addEventListener('blur', function() {
                if (this.value.trim() === '') {
                    this.style.borderColor = 'rgba(255, 107, 157, 0.3)';
                } else {
                    this.style.borderColor = 'rgba(16, 185, 129, 0.5)';
                }
            });

            input.addEventListener('focus', function() {
                this.style.borderColor = 'rgba(255, 107, 157, 0.8)';
            });

            input.addEventListener('input', function() {
                if (this.value.trim() !== '') {
                    this.style.borderColor = 'rgba(16, 185, 129, 0.5)';
                }
            });
        });

        // Prevent multiple submissions
        let isSubmitting = false;
        contactForm.addEventListener('submit', function(e) {
            if (isSubmitting) {
                e.preventDefault();
            }
            isSubmitting = true;
            setTimeout(() => {
                isSubmitting = false;
            }, 3000);
        });
    </script>
</body>
</html>
